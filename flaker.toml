[repo]
owner = "mizchi"
name = "flaker"

[storage]
path = ".flaker/data.duckdb"

[collect]
workflow_paths = [".github/workflows/ci.yml"]

[adapter]
type = "vitest"
artifact_name = "vitest-report"

[runner]
type = "vitest"
command = "pnpm exec vitest run"

[affected]
resolver = "glob"
config = "flaker.affected.toml"

[sampling]
strategy = "hybrid"
sample_percentage = 20
holdout_ratio = 0.1
co_failure_window_days = 90
calibrated_at = "2026-04-19"
detected_flaky_rate_ratio = 0.017
detected_co_failure_strength_ratio = 0.86
detected_test_count = 633

[profile.scheduled]
strategy = "full"

[profile.ci]
strategy = "hybrid"
sample_percentage = 30
holdout_ratio = 0.1
adaptive = true
adaptive_fnr_low_ratio = 0.02
adaptive_fnr_high_ratio = 0.05
adaptive_min_percentage = 15

[profile.local]
strategy = "affected"
max_duration_seconds = 30
fallback_strategy = "weighted"
